spring:
  application:
    name: nutrition-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5489}/${DB_NAME:postgres}
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:22305}


  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

  flyway:
    enabled: false
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8081}